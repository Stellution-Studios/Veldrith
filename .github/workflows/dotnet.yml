name: Build & Publish Veldrith

on:
  release:
    types: [ published ]
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore src/Veldrith.slnx

      - name: Build
        run: dotnet build src/Veldrith.slnx --no-restore --configuration Release

  publish-nuget:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore src/Veldrith.slnx

      - name: Resolve package version
        shell: bash
        run: echo "PACKAGE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Pack Veldrith
        run: dotnet pack src/Veldrith/Veldrith.csproj --configuration Release --no-restore -p:PackageVersion=${{ env.PACKAGE_VERSION }} --output artifacts/nuget

      - name: Pack Veldrith.SPIRV
        run: dotnet pack src/Veldrith.SPIRV/Veldrith.SPIRV.csproj --configuration Release --no-restore -p:PackageVersion=${{ env.PACKAGE_VERSION }} --output artifacts/nuget

      - name: Pack Veldrith.MetalBindings
        run: dotnet pack src/Veldrith.MetalBindings/Veldrith.MetalBindings.csproj --configuration Release --no-restore -p:PackageVersion=${{ env.PACKAGE_VERSION }} --output artifacts/nuget

      - name: Publish NuGet packages
        run: dotnet nuget push "artifacts/nuget/*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
